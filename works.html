<script>
// ══ WORKS DATA ════════════════════════════════════════
// ▼▼▼ 作品データは works-data.json を編集してください ▼▼▼
let WORKS = [];
const ALL_FILTER = 'all';
let currentFilter = ALL_FILTER;
const WORKS_LIST = document.getElementById('works-list');
let grouped   = new Map();
let years     = [];
const pendingYears = new Set();
const filledYears  = new Set();
let ioFill = null;
const DATA_VERSION = '20260418-1';
const WORKS_READY = fetch(`works-data.json?v=${DATA_VERSION}`)
  .then(async response => {
    if (!response.ok) throw new Error(`Failed to load works data: ${response.status}`);
    WORKS = await response.json();
    renderWorks();
  })
  .catch(error => {
    console.error(error);
    WORKS = [];
    if (WORKS_LIST) {
      WORKS_LIST.innerHTML = '<p style="color:#999;font-size:.9rem;">作品データの読み込みに失敗しました。</p>';
    }
  });

const BADGE_CLASS = {anime:'ba',anime_tieup:'bt',game:'bg',jpop:'bj'};
const BADGE_LABEL = {anime:'CHARACTER SONG',anime_tieup:'アニメ/タイアップ',game:'GAME',jpop:'J-POP'};
const CREDIT_ROLE_ORDER = ['作曲','編曲','Mix'];

function workCats(work){
  if (Array.isArray(work.cats) && work.cats.length) return work.cats;
  return work.cat ? [work.cat] : [];
}

function primaryCat(work){
  return work.cat || workCats(work)[0] || 'anime';
}

function mergeCredits(credits){
  const merged = new Map();

  credits.forEach((credit, index) => {
    const key = `${credit.name}__${index}`;
    const existingKey = [...merged.keys()].find(k => k.startsWith(`${credit.name}__`));
    const targetKey = existingKey || key;
    const entry = merged.get(targetKey) || {name: credit.name, roles: []};

    credit.role.split('・').forEach(role => {
      if(role && !entry.roles.includes(role)) entry.roles.push(role);
    });

    merged.set(targetKey, entry);
  });

  return [...merged.values()].map(entry => {
    const ordered = [
      ...CREDIT_ROLE_ORDER.filter(role => entry.roles.includes(role)),
      ...entry.roles.filter(role => !CREDIT_ROLE_ORDER.includes(role))
    ];
    return {name: entry.name, role: ordered.join('・')};
  });
}

function cardTitle(artist){
  if (!artist) return '';
  const quoteIndex = artist.search(/[「(（]/);
  return quoteIndex > 0 ? artist.slice(0, quoteIndex).trim() : artist.trim();
}

function cardArtistLabel(work){
  if (work.cat === 'game' && work.note) return work.note;
  if (/(FRUITS ZIPPER)\)/.test(work.artist)) return work.artist;
  return cardTitle(work.artist);
}

function cardRole(credits){
  const roles = [];
  mergeCredits(credits).forEach(credit => {
    credit.role.split('・').forEach(role => {
      if (role && !roles.includes(role)) roles.push(role);
    });
  });
  const ordered = [
    ...CREDIT_ROLE_ORDER.filter(role => roles.includes(role)),
    ...roles.filter(role => !CREDIT_ROLE_ORDER.includes(role))
  ];
  return ordered.join('・');
}

function tieupRows(work){
  const rows = [];
  if (work.tieupName || work.tieupType) rows.push({ value: work.tieupName || work.tieupType });
  if (work.tieupDetail) rows.push({ value: work.tieupDetail });
  return rows;
}

function renderCardTieup(work){
  const rows = tieupRows(work);
  if (primaryCat(work) !== 'anime_tieup' || rows.length === 0) return '';
  return `
    <div class="wcard-tieup">
      ${rows.map(row => `<p class="wcard-tieup-line">${row.value}</p>`).join('')}
    </div>
  `;
}

function safeAssetSrc(path){
  return encodeURI(path).replace(/'/g, '%27');
}

function thumbnailSrc(work){
  return work.thumbnail || work.jacket;
}

function yearFromDate(date){
  return String(date || '').slice(0, 4);
}

function dateSortValue(date){
  const parts = String(date || '').match(/\d+/g) || [];
  const year = Number(parts[0] || 0);
  const month = Number(parts[1] || 0);
  const day = Number(parts[2] || 0);
  return year * 10000 + month * 100 + day;
}

function revealClass(index){
  const classes = ['reveal'];
  if (index === 1) classes.push('d1');
  if (index === 2) classes.push('d2');
  if (index >= 3) classes.push('d3');
  return classes.join(' ');
}

function applyFilter(cat){
  const blockMap = new Map();
  document.querySelectorAll('.wcard').forEach(c => {
    const cats = (c.dataset.cats || '').split(',').filter(Boolean);
    c.style.display = (cat === ALL_FILTER || cats.includes(cat)) ? '' : 'none';
    const block = c.closest('.yr-block');
    if (block) {
      if (!blockMap.has(block)) blockMap.set(block, []);
      blockMap.get(block).push(c);
    }
  });
  blockMap.forEach((cards, block) => {
    block.style.display = cards.some(c => c.style.display !== 'none') ? '' : 'none';
  });
}

function buildGrouped(){
  grouped = new Map();
  WORKS.forEach((work, index) => {
    const year = yearFromDate(work.date);
    if (!grouped.has(year)) grouped.set(year, []);
    grouped.get(year).push({ work, index });
  });
  years = [...grouped.keys()].sort((a, b) => Number(b) - Number(a));
  grouped.forEach(entries => {
    entries.sort((a, b) => {
      const diff = dateSortValue(b.work.date) - dateSortValue(a.work.date);
      return diff !== 0 ? diff : a.index - b.index;
    });
  });
}

function renderSkeletons(){
  WORKS_LIST.innerHTML = years.map((year, yearIndex) => `
    <div class="yr-block ${revealClass(yearIndex)}" id="yr${year}" data-year="${year}">
      <p class="yr-head">${year}</p>
      <div class="works-grid"></div>
      ${year === '2020' ? `
        <div class="archive-callout">
          <p class="archive-copy"><strong>2019年以前のWorks</strong></p>
          <a href="history.html" class="archive-link">View Archive</a>
        </div>
      ` : ''}
      <a class="top-btn" href="#">↑ Top</a>
    </div>
  `).join('');
  document.querySelectorAll('.yr-block.reveal').forEach(el => io.observe(el));
  years.slice(1).forEach(y => pendingYears.add(y));
}

function fillYear(year){
  if (filledYears.has(year)) return;
  filledYears.add(year);
  pendingYears.delete(year);
  const block = document.getElementById(`yr${year}`);
  if (!block) return;
  const grid = block.querySelector('.works-grid');
  if (!grid) return;
  const entries = grouped.get(year) || [];
  grid.innerHTML = entries.map(({ work, index }) => `
    <div class="wcard" data-cats="${workCats(work).join(',')}" onclick="openModal(${index})">
      <div class="wcard-img">
        <img src="${safeAssetSrc(work.thumbnail || work.jacket)}" alt="${work.track}" loading="lazy" decoding="async" onerror="handleCardImageError(this)">
        <span class="wcard-badge ${BADGE_CLASS[primaryCat(work)] || 'ba'}">${BADGE_LABEL[primaryCat(work)] || primaryCat(work)}</span>
        <div class="wcard-ph"><span>♪</span><p>No Image</p></div>
      </div>
      <div>
        <p class="wcard-title">${cardArtistLabel(work)}</p>
        <p class="wcard-client">${work.track}</p>
        <p class="wcard-role">${cardRole(work.credits)}</p>
        ${renderCardTieup(work)}
      </div>
    </div>
  `).join('');
  if (currentFilter !== ALL_FILTER) {
    grid.querySelectorAll('.wcard').forEach(c => {
      const cats = (c.dataset.cats || '').split(',').filter(Boolean);
      c.style.display = cats.includes(currentFilter) ? '' : 'none';
    });
    const anyVisible = [...grid.querySelectorAll('.wcard')].some(c => c.style.display !== 'none');
    block.style.display = anyVisible ? '' : 'none';
  }
}

function initFillObserver(){
  if (pendingYears.size === 0) return;
  ioFill = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const year = entry.target.dataset.year;
      if (pendingYears.has(year)) {
        fillYear(year);
        ioFill.unobserve(entry.target);
      }
    });
  }, { rootMargin: '600px 0px' });
  years.slice(1).forEach(year => {
    const block = document.getElementById(`yr${year}`);
    if (block) ioFill.observe(block);
  });
}

function renderWorks(){
  if (!WORKS_LIST) return;
  buildGrouped();
  renderSkeletons();
  fillYear(years[0]);
  initFillObserver();
  applyFilter(currentFilter);
}

async function openModal(idx){
  await WORKS_READY;
  const w = WORKS[idx]; if(!w) return;
  const cat = primaryCat(w);
  const jEl = document.getElementById('modalJacket');
  jEl.innerHTML = '';
  if (w.jacket) {
    const img = document.createElement('img');
    img.setAttribute('src', w.jacket);
    img.setAttribute('alt', w.track);
    img.width = 600; img.height = 600;
    img.loading = 'lazy'; img.decoding = 'async';
    jEl.appendChild(img);
  } else {
    jEl.textContent = w.icon;
  }
  const bEl = document.getElementById('modalBadge');
  bEl.className = 'modal-badge '+(BADGE_CLASS[cat]||'ba');
  bEl.textContent = BADGE_LABEL[cat]||cat;
  document.getElementById('modalTrack').textContent  = w.track;
  document.getElementById('modalArtist').textContent = w.artist;
  document.getElementById('modalDate').textContent   = w.date;
  const tEl = document.getElementById('modalTieup');
  const tieup = tieupRows(w);
  if (cat === 'anime_tieup' && tieup.length) {
    tEl.innerHTML = '';
    const head = document.createElement('p');
    head.className = 'modal-section-title modal-tieup-head';
    head.textContent = 'Tie-up';
    tEl.appendChild(head);
    tieup.forEach(row => {
      const div = document.createElement('div');
      div.className = 'modal-tieup-row';
      const span = document.createElement('span');
      span.className = 'modal-tieup-value';
      span.textContent = row.value;
      div.appendChild(span);
      tEl.appendChild(div);
    });
    tEl.style.display = 'block';
  } else {
    tEl.innerHTML = '';
    tEl.style.display = 'none';
  }
  const cEl = document.getElementById('modalCredits');
  cEl.innerHTML = '';
  mergeCredits(w.credits).forEach(c => {
    const div = document.createElement('div');
    div.className = 'credit-row';
    const roleSpan = document.createElement('span');
    roleSpan.className = 'credit-role';
    roleSpan.textContent = c.role;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'credit-name';
    nameSpan.textContent = c.name;
    div.appendChild(roleSpan);
    div.appendChild(nameSpan);
    cEl.appendChild(div);
  });
  const nEl = document.getElementById('modalNote');
  if(w.note){nEl.textContent=w.note;nEl.style.display='block';}
  else{nEl.style.display='none';}
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e && e.target.closest('#modal')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

function handleCardImageError(img){
  const wrap = img.closest('.wcard-img');
  if (wrap) wrap.classList.add('is-missing');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow='';
  }
});

// Filter
function fw(cat,btn){
  currentFilter = cat;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (cat !== ALL_FILTER && pendingYears.size > 0) {
    if (ioFill) { ioFill.disconnect(); ioFill = null; }
    [...pendingYears].forEach(year => fillYear(year));
  }
  applyFilter(cat);
}

// Scroll reveal
const io=new IntersectionObserver(
  es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('on')}),
  {threshold:0.01}
);
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
