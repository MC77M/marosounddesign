[build]
  publish = "."
  command = ""

[[redirects]]
  from = "https://marosounddesign.netlify.app/*"
  to = "https://marosounddesign.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://marosounddesign.netlify.app/*"
  to = "https://marosounddesign.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.marosounddesign.com/*"
  to = "https://marosounddesign.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.marosounddesign.com/*"
  to = "https://marosounddesign.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://marosounddesign.com/*"
  to = "https://marosounddesign.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
